spring:
  application:
    name: uflex-rest-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      naming:
        physical-strategy: com.kiniot.uflex.api.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASS:}
    from:
      address: ${EMAIL_FROM_ADDRESS:}
      name: ${EMAIL_FROM_NAME:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

authorization:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      days: ${JWT_EXPIRATION_DAYS}

stripe:
  enabled: ${STRIPE_ENABLED:true}
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/subscription?payment=success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/subscription?payment=cancel}

scalar:
  enabled: true
  theme: kepler

documentation:
  application:
    title: @project.name@
    description: @project.description@
    version: @project.version@

otp:
  verification:
    expiration-minutes: 15
    code-length: 6
    password-length: 12