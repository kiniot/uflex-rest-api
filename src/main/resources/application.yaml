spring:
  application:
    name: uflex-rest-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      naming:
        physical-strategy: com.kiniot.uflex.api.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

documentation:
  application:
    title: @project.name@
    description: @project.description@
    version: @project.version@

authorization:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      days: ${JWT_EXPIRATION_DAYS}

scalar:
  enabled: true
  theme: kepler