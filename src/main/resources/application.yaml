spring:
  application:
    name: uflex-rest-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      naming:
        physical-strategy: com.kiniot.uflex.api.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASS:}
    from:
      address: ${EMAIL_FROM_ADDRESS:}
      name: ${EMAIL_FROM_NAME:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

authorization:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      days: ${JWT_EXPIRATION_DAYS}

stripe:
  enabled: ${STRIPE_ENABLED:true}
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:}
  cancel-url: ${STRIPE_CANCEL_URL:}

supabase:
  storage:
    # Base Supabase project URL, e.g. https://gjapoeuqwcnmidswhrgu.supabase.co
    url: ${SUPABASE_URL:}
    # service_role secret key — SERVER SIDE ONLY, never expose to web/mobile clients
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:uflex-media}
    upload-url-expiry-seconds: ${SUPABASE_UPLOAD_URL_EXPIRY_SECONDS:120}
    download-url-expiry-seconds: ${SUPABASE_DOWNLOAD_URL_EXPIRY_SECONDS:3600}
    max-image-bytes: ${SUPABASE_MAX_IMAGE_BYTES:10485760}
    max-video-bytes: ${SUPABASE_MAX_VIDEO_BYTES:524288000}

scalar:
  enabled: true
  theme: kepler

documentation:
  application:
    title: @project.name@
    description: @project.description@
    version: @project.version@

otp:
  verification:
    expiration-minutes: 15
    code-length: 6
    password-length: 12

brevo:
  api-key: ${BREVO_API_KEY:}
  from:
    address: ${BREVO_FROM_ADDRESS:}
    name: ${BREVO_FROM_NAME:}
