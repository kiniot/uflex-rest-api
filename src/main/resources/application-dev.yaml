server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://${UFLEX_DB_HOST:localhost}:${UFLEX_DB_PORT:5432}/${UFLEX_DB_NAME:uflex_db_dev}
    username: ${UFLEX_DB_USERNAME:admin}
    password: ${UFLEX_DB_PASSWORD:password}

logging:
  level:
    org.hibernate.SQL: debug

authorization:
  jwt:
    secret: ${JWT_SECRET:uflex-dev-secret-key-change-me-local-only}
    expiration:
      days: ${JWT_EXPIRATION_DAYS:7}

stripe:
  enabled: ${STRIPE_ENABLED:true}
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/subscription?payment=success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/subscription?payment=cancel}
